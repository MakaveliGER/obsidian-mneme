name: CI

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]

jobs:
  test-python:
    name: Python ${{ matrix.python-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install (editable) + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest

      - name: Run fast tests (skip slow model-loading)
        run: pytest -m "not slow" -q
        env:
          PYTHONIOENCODING: utf-8

      - name: Smoke test CLI
        run: mneme --help

  test-plugin:
    name: Obsidian plugin tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: obsidian-plugin/package-lock.json

      - name: Install plugin dependencies
        working-directory: obsidian-plugin
        run: npm ci

      - name: Run plugin tests
        working-directory: obsidian-plugin
        run: npm test

      - name: Typecheck + production build
        working-directory: obsidian-plugin
        run: npm run build

  build-dist:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    needs: [test-python, test-plugin]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build distribution
        run: python -m build

      - name: Twine check
        run: twine check dist/*

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 14
